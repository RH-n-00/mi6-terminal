<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HALE / SIS INTERNAL NETWORK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Libre+Baskerville:wght@400&family=Noto+Sans+KR:wght@300;400;500&display=swap');

:root{
  --bg:#040507;
  --panel:#050608;
  --panel-2:#0a0b0d;
  --gold:#d2b483;
  --gold-soft:#a58a63;
  --white:#efe8de;
  --muted:#cdbfa8;
  --line:rgba(210,180,131,.42);
  --line-soft:rgba(210,180,131,.12);
  --live:#b01814;
  --font-baskerville: Baskerville, 'Baskerville Old Face', 'Libre Baskerville', Georgia, serif;
  --font-copperplate: Copperplate, 'Copperplate Gothic Bold', 'Copperplate Gothic Light', 'Palatino Linotype', serif;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:
    radial-gradient(circle at 50% 0%, rgba(210,180,131,.06), transparent 22%),
    linear-gradient(180deg,#060709 0%, #020304 55%, #010203 100%);
  color:var(--white);
  font-family:'Inter',system-ui,sans-serif;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed; inset:0;
  pointer-events:none;
  background:
    linear-gradient(90deg, rgba(255,255,255,.015), transparent 8%, transparent 92%, rgba(255,255,255,.015)),
    repeating-linear-gradient(to bottom, rgba(255,255,255,.025) 0 1px, transparent 1px 4px);
  opacity:.18;
  mix-blend-mode:screen;
}
body::after{
  content:"";
  position:fixed; inset:0;
  pointer-events:none;
  background:radial-gradient(circle at center, transparent 54%, rgba(0,0,0,.52) 100%);
}

.shell{
  position:relative;
  width:min(96vw, 1180px);
  min-height:calc(100vh - 28px);
  margin:14px auto;
  background:linear-gradient(180deg, rgba(5,6,8,.98), rgba(2,3,4,.995));
  border:1px solid rgba(255,255,255,.045);
  box-shadow:0 40px 120px rgba(0,0,0,.58);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.shell::before{
  content:"";
  position:absolute; inset:26px;
  border:1px solid rgba(210,180,131,.05);
  pointer-events:none;
}
.shell::after{
  content:"";
  position:absolute; inset:0;
  background:radial-gradient(circle at 50% 16%, rgba(255,255,255,.02), transparent 24%);
  pointer-events:none;
}

.topbar{
  position:relative; z-index:5;
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  padding:18px 20px 16px;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.top-left,.top-right{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.label{
  display:inline-flex; align-items:center; justify-content:center;
  min-height:34px;
  padding:0 13px;
  background:rgba(255,255,255,.012);
  border:1px solid rgba(255,255,255,.055);
  color:#d8ccb7;
  font-size:11px;
  font-weight:400;
  letter-spacing:.28em;
  text-transform:uppercase;
}
.label.mark{color:var(--gold)}
.status{
  display:inline-flex; align-items:center; gap:10px;
  color:#d8ccb7;
  font-size:11px;
  letter-spacing:.28em;
  text-transform:uppercase;
}
.status-dot{
  width:7px; height:7px; border-radius:50%;
  background:var(--live);
  box-shadow:0 0 12px rgba(176,24,20,.8);
}

.hero{
  position:relative;
  flex:1;
  display:flex;
  align-items:center;
  padding:34px 0 42px;
}
.guide-left,.guide-right{
  position:absolute; top:0; bottom:0; width:1px; pointer-events:none;
  background:linear-gradient(180deg, transparent, rgba(210,180,131,.14) 8%, rgba(210,180,131,.14) 92%, transparent);
}
.guide-left{left:32px}
.guide-right{right:32px}

.hero-inner{
  position:relative; z-index:2;
  width:min(88vw, 980px);
  margin:0 auto;
}

.prism-stage{
  position:relative;
  min-height:clamp(520px, 74vh, 760px);
  border:1px solid rgba(255,255,255,.055);
  background:#000;
  overflow:hidden;
  box-shadow:
    0 30px 90px rgba(0,0,0,.48),
    inset 0 1px 0 rgba(255,255,255,.06);
}
.prism-stage::before{
  content:"";
  position:absolute; inset:18px;
  border:1px solid rgba(255,255,255,.05);
  pointer-events:none;
  z-index:2;
}
.prism-stage::after{
  content:"";
  position:absolute; inset:0;
  background:
    radial-gradient(circle at center, transparent 28%, rgba(0,0,0,.18) 72%, rgba(0,0,0,.58) 100%),
    linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.4));
  pointer-events:none;
  z-index:1;
}
.prism-canvas{
  position:absolute;
  inset:0;
  display:block;
  width:100%;
  height:100%;
}
.hero-overlay{
  position:absolute;
  inset:0;
  z-index:3;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
  text-align:center;
  color:#fff;
  pointer-events:none;
  padding:48px 32px;
}
.hero-title{
  margin:0 0 16px;
  padding-left:.16em;
  font-family:var(--font-baskerville);
  font-size:clamp(4.15rem, 10.8vw, 8.9rem);
  font-weight:400;
  line-height:.96;
  letter-spacing:.16em;
  text-transform:uppercase;
  background:linear-gradient(180deg, #ffffff 0%, #f4eee4 48%, #ffffff 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 30px rgba(255, 255, 255, 0.24)) drop-shadow(0 0 72px rgba(138, 43, 226, 0.22));
  animation:glowPulse 3.4s ease-in-out infinite alternate;
}
@keyframes glowPulse {
  from {
    filter:drop-shadow(0 0 30px rgba(255, 255, 255, 0.24)) drop-shadow(0 0 72px rgba(138, 43, 226, 0.22));
  }
  to {
    filter:drop-shadow(0 0 48px rgba(255, 255, 255, 0.38)) drop-shadow(0 0 110px rgba(0, 191, 255, 0.28));
  }
}
.hero-tagline{
  margin:0;
  color:rgba(255, 255, 255, 0.92);
  font-family:var(--font-copperplate);
  font-size:clamp(0.92rem, 2vw, 1.2rem);
  font-weight:400;
  line-height:1.7;
  letter-spacing:0.3em;
  text-transform:uppercase;
  text-shadow:0 0 30px rgba(255, 255, 255, 0.4), 0 0 60px rgba(138, 43, 226, 0.24);
}
.hero-buttons{
  display:flex;
  justify-content:center;
  gap:24px;
  margin-top:42px;
  pointer-events:auto;
  flex-wrap:wrap;
}
.glass-button{
  position:relative;
  min-width:188px;
  padding:16px 40px;
  font-family:var(--font-copperplate);
  font-size:1rem;
  font-weight:700;
  letter-spacing:0.16em;
  color:#fff;
  background:linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
  border:1.5px solid transparent;
  border-radius:40px;
  backdrop-filter:blur(30px);
  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.2),
    inset 0 1px 0 rgba(255, 255, 255, 0.2),
    inset 0 -1px 0 rgba(255, 255, 255, 0.05);
  overflow:hidden;
  cursor:pointer;
  transition:all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events:auto;
  text-transform:uppercase;
}
.glass-button::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:40px;
  padding:1.5px;
  background:linear-gradient(135deg,
    rgba(255, 255, 255, 0.4) 0%,
    rgba(138, 43, 226, 0.4) 25%,
    rgba(0, 191, 255, 0.4) 50%,
    rgba(255, 105, 180, 0.4) 75%,
    rgba(255, 255, 255, 0.4) 100%);
  background-size:200% 200%;
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  animation:borderFlow 3s linear infinite;
  opacity:0.6;
  transition:opacity 0.5s ease;
}
@keyframes borderFlow {
  0% { background-position:0% 50%; }
  100% { background-position:200% 50%; }
}
.glass-button::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:40px;
  background:radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255, 255, 255, 0.2) 0%, transparent 50%);
  opacity:0;
  transition:opacity 0.5s ease;
}
.glass-button:hover{
  background:linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 100%);
  box-shadow:
    0 12px 48px rgba(138, 43, 226, 0.3),
    0 0 80px rgba(0, 191, 255, 0.2),
    inset 0 1px 0 rgba(255, 255, 255, 0.3),
    inset 0 -1px 0 rgba(255, 255, 255, 0.1);
  transform:translateY(-3px) scale(1.02);
}
.glass-button:hover::before{
  opacity:1;
  animation-duration:2s;
}
.glass-button:hover::after{opacity:1}
.glass-button:active{
  transform:translateY(-1px) scale(0.98);
  box-shadow:
    0 6px 24px rgba(138, 43, 226, 0.2),
    inset 0 1px 0 rgba(255, 255, 255, 0.3);
}
.hero-shimmer{
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:linear-gradient(
    90deg,
    transparent 0%,
    rgba(255, 255, 255, 0.1) 45%,
    rgba(255, 255, 255, 0.3) 50%,
    rgba(255, 255, 255, 0.1) 55%,
    transparent 100%
  );
  transform:rotate(30deg);
  animation:shimmer 3s infinite;
  pointer-events:none;
}
@keyframes shimmer {
  0% { transform:translateX(-100%) rotate(30deg); }
  100% { transform:translateX(100%) rotate(30deg); }
}
.glass-button:hover .hero-shimmer{animation-duration:1.5s}
.glass-button span{
  position:relative;
  z-index:1;
}

@media (max-width: 1024px){
  .hero{padding:28px 0 34px}
  .prism-stage{min-height:640px}
  .hero-title{font-size:clamp(3.9rem, 12vw, 7.2rem);}
}

@media (max-width: 700px){
  .shell{width:100vw; margin:0; min-height:100vh; border:none}
  .shell::before{inset:16px}
  .topbar{padding:14px 14px 12px}
  .label,.status{font-size:9px; letter-spacing:.22em; min-height:28px}
  .hero{padding:22px 0 26px}
  .guide-left{left:16px}
  .guide-right{right:16px}
  .hero-inner{width:min(92vw, 100%)}
  .prism-stage{min-height:520px}
  .prism-stage::before{inset:12px}
  .hero-overlay{padding:36px 22px}
  .hero-title{
    margin-bottom:14px;
    padding-left:.12em;
    font-size:clamp(3.25rem, 18vw, 5.8rem);
    line-height:1.0;
    letter-spacing:.12em;
  }
  .hero-tagline{font-size:11px; letter-spacing:.26em}
  .hero-buttons{gap:14px; margin-top:30px}
  .glass-button{
    width:100%;
    min-width:0;
    padding:15px 26px;
    font-size:.92rem;
    letter-spacing:.14em;
  }
}
</style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="top-left">
        <span class="label mark">SIS</span>
        <span class="label">Internal Network / Restricted Access</span>
      </div>

      <div class="hero-inner">
        <section class="prism-stage" id="heroStage" aria-label="HALE prism hero">
          <canvas class="prism-canvas" id="prismCanvas" aria-hidden="true"></canvas>

          <div class="hero-overlay">
            <h1 class="hero-title">HALE</h1>

            <div class="hero-buttons">
              <button class="glass-button" type="button">
                <span class="hero-shimmer"></span>

              </button>

            </div>
          </div>

      </div>
    </section>
  </main>

<script id="vertexShader" type="x-shader/x-vertex">#version 300 es
precision highp float;
in vec4 position;
void main() {
  gl_Position = position;
}
</script>

<script id="fragmentShader" type="x-shader/x-fragment">#version 300 es
/*********
* made by Matthias Hurrle (@atzedent)
*/
precision highp float;
out vec4 O;
uniform float time;
uniform vec2 resolution;
uniform vec2 move;
#define FC gl_FragCoord.xy
#define R resolution
#define T time
#define N normalize
#define S smoothstep
#define MN min(R.x,R.y)
#define rot(a) mat2(cos((a)-vec4(0,11,33,0)))
#define csqr(a) vec2(a.x*a.x-a.y*a.y,2.*a.x*a.y)

float rnd(vec3 p) {
	p=fract(p*vec3(12.9898,78.233,156.34));
	p+=dot(p,p+34.56);
	return fract(p.x*p.y*p.z);
}

float swirls(in vec3 p) {
	float d=.0;
	vec3 c=p;
	for(float i=min(.0,time); i<9.; i++) {
		p=.7*abs(p)/dot(p,p)-.7;
		p.yz=csqr(p.yz);
		p=p.zxy;
		d+=exp(-19.*abs(dot(p,c)));
	}
	return d;
}

vec3 march(in vec3 p, vec3 rd) {
	float d=.2, t=.0, c=.0, k=mix(.9,1.,rnd(rd)),
	maxd=length(p)-1.;
	vec3 col=vec3(0);
	for(float i=min(.0,time); i<120.; i++) {
		t+=d*exp(-2.*c)*k;
		c=swirls(p+rd*t);
		if (t<5e-2 || t>maxd) break;
		col+=vec3(c*c,c/1.05,c)*8e-3;
	}
	return col;
}

float rnd(vec2 p) {
	p=fract(p*vec2(12.9898,78.233));
	p+=dot(p,p+34.56);
	return fract(p.x*p.y);
}

vec3 sky(vec2 p, bool anim) {
	p.x-=.17-(anim?2e-4*T:.0);
	p*=500.;
	vec2 id=floor(p), gv=fract(p)-.5;
	float n=rnd(id), d=length(gv);
	if (n<.975) return vec3(0);
	return vec3(S(3e-2*n,1e-3*n,d*d));
}

void cam(inout vec3 p) {
	p.yz*=rot(move.y*9.45/MN-T*.035);
	p.xz*=rot(-move.x*9.45/MN+T*.0175);
}

void main() {
	vec2 uv=(FC-.5*R)/MN;
	vec3 col=vec3(0),
	p=vec3(0,0,-16),
	rd=N(vec3(uv,1)), rdd=rd;
	cam(p); cam(rd);
	col=march(p,rd);
	col=S(-.2,.9,col);
	vec2 sn=.5+vec2(atan(rdd.x,rdd.z),atan(length(rdd.xz),rdd.y))/6.28318;
	col=max(col,vec3(sky(sn,true)+sky(2.+sn*2.,true)));
	float t=min((time-.5)*.3,1.);
	uv=FC/R*2.-1.;
	uv*=.7;
	float v=pow(dot(uv,uv),1.8);
	col=mix(col,vec3(0),v);
	col=mix(vec3(0),col,t);
	col=max(col,.08);
	O=vec4(col,1);
}
</script>

<script>
(function(){
  const heroButtons = document.querySelectorAll('.glass-button');

  heroButtons.forEach((button) => {
    button.addEventListener('mousemove', (e) => {
      const rect = button.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;
      button.style.setProperty('--x', x + '%');
      button.style.setProperty('--y', y + '%');
    });
  });

  const canvas = document.getElementById('prismCanvas');
  const stage = document.getElementById('heroStage');
  const gl = canvas.getContext('webgl2', { antialias: true, alpha: false });

  if (!gl) {
    stage.style.background = 'radial-gradient(circle at 50% 35%, rgba(38,49,82,.7), rgba(0,0,0,.96) 58%)';
    return;
  }

  function createShader(type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);

    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(shader));
      return null;
    }
    return shader;
  }

  function createProgram(vertexShader, fragmentShader) {
    const program = gl.createProgram();
    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);
    gl.linkProgram(program);

    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      console.error(gl.getProgramInfoLog(program));
      return null;
    }
    return program;
  }

  const vertexShaderSource = document.getElementById('vertexShader').textContent.trim();
  const fragmentShaderSource = document.getElementById('fragmentShader').textContent.trim();

  const vertexShader = createShader(gl.VERTEX_SHADER, vertexShaderSource);
  const fragmentShader = createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

  if (!vertexShader || !fragmentShader) {
    stage.style.background = 'radial-gradient(circle at 50% 35%, rgba(38,49,82,.7), rgba(0,0,0,.96) 58%)';
    return;
  }

  const program = createProgram(vertexShader, fragmentShader);

  if (!program) {
    stage.style.background = 'radial-gradient(circle at 50% 35%, rgba(38,49,82,.7), rgba(0,0,0,.96) 58%)';
    return;
  }

  const vao = gl.createVertexArray();
  gl.bindVertexArray(vao);

  const positions = new Float32Array([
    -1,  1,
    -1, -1,
     1,  1,
     1, -1
  ]);

  const positionBuffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
  gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

  const positionLocation = gl.getAttribLocation(program, 'position');
  gl.enableVertexAttribArray(positionLocation);
  gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

  const uTime = gl.getUniformLocation(program, 'time');
  const uResolution = gl.getUniformLocation(program, 'resolution');
  const uMove = gl.getUniformLocation(program, 'move');

  const pointer = {
    active: false,
    lastX: 0,
    lastY: 0,
    moveX: 0,
    moveY: 0
  };

  function updatePointerDelta(x, y) {
    if (!pointer.active) {
      pointer.lastX = x;
      pointer.lastY = y;
      pointer.active = true;
      return;
    }

    pointer.moveX += (x - pointer.lastX);
    pointer.moveY += (y - pointer.lastY);
    pointer.lastX = x;
    pointer.lastY = y;
  }

  stage.addEventListener('pointerenter', (e) => {
    pointer.lastX = e.clientX;
    pointer.lastY = e.clientY;
    pointer.active = true;
  });

  stage.addEventListener('pointermove', (e) => {
    updatePointerDelta(e.clientX, e.clientY);
  });

  stage.addEventListener('pointerleave', () => {
    pointer.active = false;
  });

  function resizeCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = stage.getBoundingClientRect();
    const width = Math.max(1, Math.floor(rect.width * dpr));
    const height = Math.max(1, Math.floor(rect.height * dpr));

    if (canvas.width !== width || canvas.height !== height) {
      canvas.width = width;
      canvas.height = height;
      gl.viewport(0, 0, width, height);
    }
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  if (window.ResizeObserver) {
    const ro = new ResizeObserver(resizeCanvas);
    ro.observe(stage);
  }

  let startTime = performance.now();

  function render(now) {
    resizeCanvas();

    const currentTime = (now - startTime) * 0.001;

    pointer.moveX *= 0.95;
    pointer.moveY *= 0.95;

    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(program);
    gl.bindVertexArray(vao);

    gl.uniform2f(uResolution, canvas.width, canvas.height);
    gl.uniform1f(uTime, currentTime);
    gl.uniform2f(uMove, pointer.moveX, pointer.moveY);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);
})();
</script>
